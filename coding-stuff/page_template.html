<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>Voylin's site</title>
    <script>
      function showBlogLinks() {
        var x = document.getElementById("blog_list");
        if (x.style.display === "none") {
          x.style.display = "block";
        } else {
          x.style.display = "none";
        }
      }
    </script>
  </head>
  <body>
    <header>
      <a href="index.html" target="_self">
        <img class="site-logo" alt="Site Logo" src="images/logo-white.webp">
      </a>
      <ul>
        <li><a href="index.html">Homepage</a></li>
        <li>
          <a href="blog.html">Blog</a><button onclick="showBlogLinks()">+</button>
          <div id="blog_list" style="display: none;">
            <p>hello</p>
          </div>
        </li>
        <li><a href="about_us.html">About us</a></li>
        <li><a href="contact_us.html">Contact us</a></li>
      </ul>
      <!--Search-->
      <!--Social Media icons-->
      <table class="sns-icons">
        <tr>
          <th><a href="https://youtube.com/voylin" target="_blank">
            <img src="images/icon-youtube.svg" alt="Youtube icon" width="30" height="30"></img>
          </a></th>
          <th><a href="https://instagram.com/voylinslife" target="_blank">
            <img src="images/icon-instagram.svg" alt="Instagram icon" width="30" height="30"></img>
          </a></th>
          <th><a href="https://facebook.com/voylinslife" target="_blank">
            <img src="images/icon-facebook.svg" alt="Facebook icon" width="30" height="30"></img>
          </a></th>
          <th><a href="https://github.com/voylin" target="_blank">
            <img src="images/icon-github.svg" alt="Github icon" width="30" height="30"></img>
          </a></th>
          <th><a href="https://patreon.com/voylin" target="_blank">
            <img src="images/icon-patreon.svg" alt="Patreon icon" width="30" height="30"></img>
          </a></th>
        </tr>
      </table>
    </header>
    <div class="page-title">
      <div class="breadcrumbs">{{Breadcrumbs}}</div>
      <div class="title">{{page_title}}</div>
    </div>
    <main>
      {{content}}
    </main>
    <footer>
      <div class="copyright">
        <p>Copyright of <a href="https://youtube.com/voylin">Voylin's Life</a></p>
      </div>
    </footer>
  </body>
</html>
