<head>
	<!-- Basic Page Metadata -->
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>{{ TITLE }}</title>
	<meta name="description" content="{{ DESCRIPTION }}">
	<meta name="keywords" content="{{ KEYWORDS }}">
	<meta name="author" content="{{ AUTHOR }}">
	<link rel="icon" href="{{ DATA_SITE-FAVICON-PATH }}" type="image/x-icon">
	<link rel="stylesheet" href="{{ DATA_SITE-PATH-CSS }}">

	<!-- Open Graph Metadata (for Facebook, LinkedIn, etc.) -->
	<meta property="og:title" content="{{ TITLE }}">
	<meta property="og:description" content="{{ DESCRIPTION }}">
	<meta property="og:type" content="website">
	<meta property="og:url" content="{{ DATA_SITE-URL }}">
	<meta property="og:image" content="{{ THUMBNAIL }}">
	<meta property="og:image:alt" content="{{ THUMBNAIL-ALT }}">
	<meta property="og:site_name" content="{{ DATA_SITE-NAME }}">

	<!-- Twitter Card Metadata -->
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="{{ TITLE }}">
	<meta name="twitter:description" content="{{ DESCRIPTION }}">
	<meta name="twitter:image" content="{{ THUMBNAIL }}">
	<meta name="twitter:image:alt" content="{{ THUMBNAIL-ALT }}">
	<meta name="twitter:site" content="{{ DATA_TWITTER-HANDLE }}">
	<meta name="twitter:creator" content="{{ DATA_TWITTER-HANDLE }}">

</head>
